# Render Blueprint for the API (free plan, Docker).
# Secrets (REDIS_URL, CORS_ORIGIN) are NOT stored here — they're synced in from
# Doppler via the Doppler→Render integration. See docs/DEPLOY.md.
services:
  - type: web
    name: api-rate-limiting
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: RATE_LIMIT_CAPACITY
        value: "10"
      - key: RATE_LIMIT_REFILL_PER_SEC
        value: "5"
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
